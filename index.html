<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS Video Call</title>
    <!-- PeerJS Library CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        .status { margin: 15px 0; font-weight: bold; color: #00e676; word-break: break-all; }
        .video-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .video-box { width: 100%; max-width: 360px; height: 270px; background: #000; border-radius: 10px; border: 2px solid #333; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-box p { position: absolute; top: 10px; left: 10px; z-index: 10; margin: 0; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>PeerJS Direct Video Call</h2>
    <div id="status" class="status">ক্যামেরা ও কানেকশন রেডি হচ্ছে...</div>

    <div class="video-container">
        <div class="video-box">
            <p>আপনার ক্যামেরা</p>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="video-box">
            <p>অপরদিকের ক্যামেরা</p>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');

        let localStream;
        let peer;

        // ১. ক্যামেরা চালু করা
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                localVideo.srcObject = stream;
                statusDiv.innerText = "ক্যামেরা চালু হয়েছে। সার্ভারে কানেক্ট হচ্ছে...";
                
                initPeer();
            })
            .catch(err => {
                statusDiv.innerText = "ক্যামেরা পারমিশন পাওয়া যায়নি!";
                console.error(err);
            });

        function initPeer() {
            // URL Hash থেকে আইডি নেওয়া বা তৈরি করা
            let roomID = location.hash.substring(1);

            if (!roomID) {
                // ১ম ইউজার হলে নতুন রুম আইডি তৈরি হবে
                roomID = Math.random().toString(36).substring(2, 9);
                location.hash = roomID;
                
                peer = new Peer(roomID);

                peer.on('open', id => {
                    statusDiv.innerText = "আপনার রুম রেডি! লিঙ্কটি কপি করে ২য় ফোনে ওপেন করুন।";
                });

                // ১ম ইউজারের কাছে কল আসলে রিসিভ করা
                peer.on('call', call => {
                    call.answer(localStream);
                    call.on('stream', remoteStream => {
                        remoteVideo.srcObject = remoteStream;
                        statusDiv.innerText = "ভিডিও কল সফলভাবে কানেক্ট হয়েছে!";
                    });
                });

            } else {
                // ২য় ইউজার লিঙ্কে ঢুকলে ১ম ইউজারকে কল দেবে
                peer = new Peer();

                peer.on('open', id => {
                    statusDiv.innerText = "১ম ইউজারের সাথে কানেক্ট করা হচ্ছে...";
                    
                    const call = peer.call(roomID, localStream);
                    
                    call.on('stream', remoteStream => {
                        remoteVideo.srcObject = remoteStream;
                        statusDiv.innerText = "ভিডিও কল সফলভাবে কানেক্ট হয়েছে!";
                    });
                });
            }
        }
    </script>
</body>
</html>
