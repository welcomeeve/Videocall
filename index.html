<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Fixed Video Call</title>
    <!-- Scaledrone & SimplePeer CDNs -->
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .status { margin: 15px 0; font-weight: bold; color: #00e676; }
        .video-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .video-box { display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 360px; height: 270px; background: #000; border-radius: 10px; border: 2px solid #333; object-fit: cover; }
    </style>
</head>
<body>

    <h2>P2P Video Call (100% Fixed)</h2>
    <div id="status" class="status">ক্যামেরা চালু হচ্ছে...</div>

    <div class="video-container">
        <div class="video-box">
            <p>আপনার ক্যামেরা (Local)</p>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="video-box">
            <p>অপরদিকের ক্যামেরা (Remote)</p>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const SCALEDRONE_CHANNEL_ID = 'OItfCr1sKHTdnuja';
        
        if (!location.hash) {
            location.hash = Math.floor(Math.random() * 0xFFFFFF).toString(16);
        }
        const roomHash = location.hash.substring(1);
        const roomName = 'observable-' + roomHash;

        let drone = new Scaledrone(SCALEDRONE_CHANNEL_ID);
        let room;
        let peer;
        let localStream;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');

        // ১. আগে লোকাল ক্যামেরা চালু করা
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localVideo.srcObject = stream;
                localStream = stream;
                statusDiv.innerText = "আপনার ক্যামেরা চালু হয়েছে। অন্যজনকে যুক্ত হতে বলুন।";
                initDrone();
            })
            .catch(error => {
                statusDiv.innerText = "ক্যামেরা পারমিশন পাওয়া যায়নি!";
                console.error(error);
            });

        function initDrone() {
            drone.on('open', error => {
                if (error) return console.error(error);

                room = drone.subscribe(roomName);

                room.on('open', error => {
                    if (error) console.error(error);
                });

                // রুমে কানেক্ট হলে এবং দ্বিতীয় ইউজার এলে
                room.on('members', members => {
                    statusDiv.innerText = `রুম সদস্য: ${members.length} জন`;
                    
                    // প্রথম যে আসবে সে Initiator হবে
                    const isInitiator = members.length === 2;
                    if (isInitiator) {
                        initPeer(true);
                    }
                });
            });

            // সিগন্যালিং মেসেজ হ্যান্ডলার
            drone.on('data', (message, member) => {
                if (member.id === drone.clientId) return;

                if (!peer) {
                    initPeer(false);
                }

                peer.signal(message);
            });
        }

        function initPeer(initiator) {
            peer = new SimplePeer({
                initiator: initiator,
                stream: localStream,
                trickle: true,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            // সিগন্যালিং ডাটা সেন্ড করা
            peer.on('signal', data => {
                drone.publish({
                    room: roomName,
                    message: data
                });
            });

            // রিমোট স্ট্রিম পাওয়ার পর ভিডিও প্লে করা
            peer.on('stream', stream => {
                remoteVideo.srcObject = stream;
                statusDiv.innerText = "ভিডিও কল সফলভাবে কানেক্ট হয়েছে!";
                remoteVideo.play().catch(e => console.log("Play error:", e));
            });

            peer.on('error', err => console.error('Peer error:', err));
        }
    </script>
</body>
</html>
