<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed WebRTC Video Call</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .status { margin: 15px 0; font-weight: bold; color: #00e676; }
        .video-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        video { width: 100%; max-width: 400px; height: 280px; background: #000; border-radius: 10px; border: 2px solid #333; object-fit: cover; }
    </style>
</head>
<body>

    <h2>ভিডিও কল টেস্ট</h2>
    <div id="status" class="status">ক্যামেরা চালু হচ্ছে...</div>
    <p>নিচের ভিডিওগুলো চেক করুন:</p>

    <div class="video-container">
        <div>
            <p>আপনার ভিডিও</p>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <p>অন্যজনের ভিডিও</p>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script>
        // ১. আপনার Scaledrone Channel ID
        const SCALEDRONE_CHANNEL_ID = 'OItfCr1sKHTdnuja';
        
        // ২. URL থেকে রুমের নাম নেওয়া (না থাকলে ডিফল্ট রুম তৈরি করা)
        if (!location.hash) {
            location.hash = Math.floor(Math.random() * 0xFFFFFF).toString(16);
        }
        const roomHash = location.hash.substring(1);
        const roomName = 'observable-' + roomHash;

        let drone = new Scaledrone(SCALEDRONE_CHANNEL_ID);
        let room;
        let pc;
        let localStream;

        // Google STUN Servers
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');

        // ক্যামেরা এক্সেস নেওয়া
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localVideo.srcObject = stream;
                localStream = stream;
                statusDiv.innerText = "ক্যামেরা রেডি! লিঙ্কটি কপি করে অন্য ফোনে পাঠান।";
                startDrone();
            })
            .catch(error => {
                statusDiv.innerText = "ক্যামেরা এক্সেস পাওয়া যায়নি!";
                console.error(error);
            });

        function startDrone() {
            drone.on('open', error => {
                if (error) return console.error(error);

                room = drone.subscribe(roomName);

                room.on('open', error => {
                    if (error) console.error(error);
                });

                // রুমে কতজন আছে দেখা
                room.on('members', members => {
                    statusDiv.innerText = `রুম সদস্য: ${members.length} জন।`;
                    // দ্বিতীয় ইউজার যুক্ত হলে যে আগে এসেছে সে Offer পাঠাবে
                    const isOfferer = members.length === 2;
                    startWebRTC(isOfferer);
                });
            });

            // সিগন্যালিং মেসেজ হ্যান্ডলার
            drone.on('data', (text, member) => {
                if (member.id === drone.clientId) return;

                if (text.sdp) {
                    pc.setRemoteDescription(new RTCSessionDescription(text.sdp), () => {
                        if (pc.remoteDescription.type === 'offer') {
                            pc.createAnswer().then(localDescCreated).catch(console.error);
                        }
                    }, console.error);
                } else if (text.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(text.candidate), () => {
                        statusDiv.innerText = "ভিডিও কল সফলভাবে কানেক্ট হয়েছে!";
                    }, console.error);
                }
            });
        }

        function startWebRTC(isOfferer) {
            pc = new RTCPeerConnection(configuration);

            // লোকাল ট্র্যাক যোগ করা
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // রিমোট ট্র্যাক পাওয়া
            pc.ontrack = event => {
                remoteVideo.srcObject = event.streams[0];
            };

            // ICE Candidate পাঠানো
            pc.onicecandidate = event => {
                if (event.candidate) {
                    sendMessage({ candidate: event.candidate });
                }
            };

            // Offer তৈরি
            if (isOfferer) {
                pc.createOffer().then(localDescCreated).catch(console.error);
            }
        }

        function localDescCreated(desc) {
            pc.setLocalDescription(desc, () => sendMessage({ sdp: pc.localDescription }), console.error);
        }

        function sendMessage(message) {
            drone.publish({ room: roomName, message: message });
        }
    </script>
</body>
</html>
