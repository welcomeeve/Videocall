<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed P2P WebRTC Video Call</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .status { margin: 15px 0; font-weight: bold; color: #00e676; }
        .video-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .video-box { display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 360px; height: 270px; background: #000; border-radius: 10px; border: 2px solid #333; object-fit: cover; }
    </style>
</head>
<body>

    <h2>P2P Video Call Fix</h2>
    <div id="status" class="status">ক্যামেরা অন করা হচ্ছে...</div>

    <div class="video-container">
        <div class="video-box">
            <p>আপনার ক্যামেরা (Local)</p>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="video-box">
            <p>অপরদিকের ক্যামেরা (Remote)</p>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const SCALEDRONE_CHANNEL_ID = 'OItfCr1sKHTdnuja';
        
        if (!location.hash) {
            location.hash = Math.floor(Math.random() * 0xFFFFFF).toString(16);
        }
        const roomHash = location.hash.substring(1);
        const roomName = 'observable-' + roomHash;

        let drone = new Scaledrone(SCALEDRONE_CHANNEL_ID);
        let room;
        let pc;
        let localStream;
        let remoteStream;

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');

        // ১. আগে নিজের ক্যামেরা চালু করা
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localVideo.srcObject = stream;
                localStream = stream;
                statusDiv.innerText = "আপনার ক্যামেরা রেডি! লিঙ্ক কপি করে অন্য ফোনে পেস্ট করুন।";
                startDrone();
            })
            .catch(error => {
                statusDiv.innerText = "ক্যামেরা পারমিশন পাওয়া যায়নি!";
                console.error(error);
            });

        function startDrone() {
            drone.on('open', error => {
                if (error) return console.error(error);

                room = drone.subscribe(roomName);

                room.on('members', members => {
                    statusDiv.innerText = `রুম সদস্য: ${members.length} জন।`;
                    // যদি ২ জন থাকে তবে ভিডিও কল কানেকশন শুরু হবে
                    const isOfferer = members.length === 2;
                    startWebRTC(isOfferer);
                });
            });

            drone.on('data', (text, member) => {
                if (member.id === drone.clientId) return;

                if (text.sdp) {
                    pc.setRemoteDescription(new RTCSessionDescription(text.sdp), () => {
                        if (pc.remoteDescription.type === 'offer') {
                            pc.createAnswer().then(localDescCreated).catch(console.error);
                        }
                    }, console.error);
                } else if (text.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(text.candidate))
                      .catch(console.error);
                }
            });
        }

        function startWebRTC(isOfferer) {
            pc = new RTCPeerConnection(configuration);

            // রিমোট ট্র্যাকিং এর জন্য ফিক্সড স্ট্রিমিং অবজেক্ট তৈরি
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            // লোকাল স্ট্রিম অ্যাড করা
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // রিমোট ফোনের স্ট্রিম আসলে তা remoteVideo-তে সেট করা
            pc.ontrack = event => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
                statusDiv.innerText = "ভিডিও কল কানেক্ট হয়েছে!";
                
                // মোবাইল ব্রাউজারে রিমোট ভিডিও জোরপূর্বক চালু করার চেষ্টা
                remoteVideo.play().catch(e => console.log("Auto-play error:", e));
            };

            pc.onicecandidate = event => {
                if (event.candidate) {
                    sendMessage({ candidate: event.candidate });
                }
            };

            if (isOfferer) {
                pc.onnegotiationneeded = () => {
                    pc.createOffer().then(localDescCreated).catch(console.error);
                };
            }
        }

        function localDescCreated(desc) {
            pc.setLocalDescription(desc, () => sendMessage({ sdp: pc.localDescription }), console.error);
        }

        function sendMessage(message) {
            drone.publish({ room: roomName, message: message });
        }
    </script>
</body>
</html>
